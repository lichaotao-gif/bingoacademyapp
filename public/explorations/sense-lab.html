<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI 感知实验室</title><style>body{margin:0;font-family:Arial,"PingFang SC",sans-serif;background:#eaf8ff;color:#10213d}.app{max-width:760px;margin:auto;padding:28px 18px}.panel{background:#fff;border-radius:24px;padding:28px;box-shadow:0 14px 34px #0e5f8820}h1{margin:0;font-size:30px}.sub{color:#5b6d7d;line-height:1.7}.signal{margin:26px 0;border-radius:18px;background:#10213d;padding:26px;text-align:center;color:white}.value{font-size:56px;font-weight:700}.options{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}button{min-height:50px;border:0;border-radius:14px;background:#e5f7fb;color:#075f75;font-size:16px;font-weight:700;cursor:pointer}button:hover{background:#0e9fba;color:#fff}.result{min-height:28px;margin-top:20px;font-weight:700;text-align:center}.back{display:inline-block;margin-bottom:18px;color:#087f9a;text-decoration:none}</style></head><body><main class="app"><a class="back" href="/tools">← 返回探索平台</a><section class="panel"><h1>AI 感知实验室</h1><p class="sub">AI 需要先接收信号，才能做出判断。请观察传感器读数，选择最合适的反应。</p><div class="signal"><p>当前光线强度</p><div class="value" id="value">20</div><p>数值越低，环境越暗</p></div><div class="options"><button onclick="answer('开灯')">开灯</button><button onclick="answer('关灯')">关灯</button><button onclick="answer('播放音乐')">播放音乐</button></div><p class="result" id="result"></p></section></main><script>function answer(v){document.getElementById('result').textContent=v==='开灯'?'回答正确！传感器发现环境较暗，智能灯可以自动点亮。':'再想想：这里需要根据光线传感器的读数做出反应。'}</script></body></html>
