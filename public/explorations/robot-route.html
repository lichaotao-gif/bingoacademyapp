<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>机器人的路线</title><style>body{margin:0;font-family:Arial,"PingFang SC",sans-serif;background:#fff4e8;color:#4a2108}.app{max-width:760px;margin:auto;padding:28px 18px}.panel{background:#fff;border-radius:24px;padding:28px;box-shadow:0 14px 34px #f9731620}h1{margin:0;font-size:30px}.sub{color:#815d43;line-height:1.7}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:26px 0}.cell{aspect-ratio:1;border-radius:12px;background:#fff0d9;display:grid;place-items:center;font-size:25px}.goal{background:#fed7aa}.commands{display:flex;gap:12px;flex-wrap:wrap}button{min-height:50px;border:0;border-radius:14px;background:#ffedd5;color:#9a3412;font-size:16px;font-weight:700;padding:0 18px;cursor:pointer}button:hover{background:#f97316;color:#fff}.result{min-height:28px;margin-top:20px;font-weight:700}.back{display:inline-block;margin-bottom:18px;color:#c2410c;text-decoration:none}</style></head><body><main class="app"><a class="back" href="/tools">← 返回探索平台</a><section class="panel"><h1>机器人的路线</h1><p class="sub">给机器人下达指令。目标在右侧，连续点击“向右”三次即可抵达。</p><div class="grid" id="grid"></div><div class="commands"><button onclick="move()">向右移动</button><button onclick="reset()">重新开始</button></div><p class="result" id="result"></p></section></main><script>let pos=0;function draw(){document.getElementById('grid').innerHTML=[0,1,2,3].map(i=>'<div class="cell '+(i===3?'goal':'')+'">'+(i===pos?'●':i===3?'◎':'')+'</div>').join('')}function move(){if(pos<3)pos++;draw();document.getElementById('result').textContent=pos===3?'成功抵达！程序由一条条简单指令组成。':''}function reset(){pos=0;draw();document.getElementById('result').textContent=''}draw()</script></body></html>
